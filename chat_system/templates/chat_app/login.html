{% extends 'base.html' %}
{% block title %}Login — ChatApp{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:400px;">
        <div style="text-align:center;margin-bottom:28px;">
            <h1 style="font-size:1.6rem;font-weight:700;color:#1a1a2e;">💬 Welcome Back</h1>
            <p style="color:var(--gray-600);font-size:0.9rem;margin-top:6px;">Sign in to continue chatting</p>
        </div>

        {% for message in messages %}
        <div class="alert alert-error">{{ message }}</div>
        {% endfor %}

        <form method="post" id="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:1rem;margin-top:8px;">
                Sign In
            </button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:0.9rem;color:var(--gray-600);">
            New here? <a href="{% url 'register' %}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
