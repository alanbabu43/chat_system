{% extends 'base.html' %}
{% block title %}Register — ChatApp{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:420px;">
        <div style="text-align:center;margin-bottom:28px;">
            <h1 style="font-size:1.6rem;font-weight:700;color:#1a1a2e;">💬 Create Account</h1>
            <p style="color:var(--gray-600);font-size:0.9rem;margin-top:6px;">Join the chat — it's free</p>
        </div>

        {% for message in messages %}
        <div class="alert alert-error">{{ message }}</div>
        {% endfor %}

        <form method="post" id="register-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="{{ username|default:'' }}" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ email|default:'' }}" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password1">Password</label>
                <input type="password" id="password1" name="password1" placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" id="password2" name="password2" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:1rem;margin-top:8px;">
                Create Account
            </button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:0.9rem;color:var(--gray-600);">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
